# 极空间 NAS 一键部署模板（使用 GitHub Container Registry 预构建镜像）
# 此文件可直接复制到极空间 Docker → Compose → 新建项目 的代码框中。
# 记得先把 .env 示例中的值填好，并替换下面的 IMAGE_TAG。

services:
  diyou-backend:
    image: ghcr.io/xingtianchunyan/diyou-backend:latest
    container_name: diyou-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - TRUST_PROXY=true
      - DATABASE_URL=file:/data/db/diyou.db
      - STORAGE_ROOT=/data/storage
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@diyouzuqiu.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - CORS_ORIGIN=${CORS_ORIGIN:?CORS_ORIGIN is required}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - diyou-db:/data/db
      - diyou-storage:/data/storage
    networks:
      - diyou-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  diyou-web:
    image: ghcr.io/xingtianchunyan/diyou-web:latest
    container_name: diyou-web
    restart: unless-stopped
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:?SITE_ADDRESS is required}
      - BACKEND_URL=diyou-backend:3000
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - diyou-net
    depends_on:
      diyou-backend:
        condition: service_healthy

volumes:
  diyou-db:
  diyou-storage:
  caddy-data:
  caddy-config:

networks:
  diyou-net:
    driver: bridge
